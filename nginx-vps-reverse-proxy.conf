# /etc/nginx/sites-available/itssafe.in
# ──────────────────────────────────────────────────────────────────────────────
# Place this file on your VPS at:  /etc/nginx/sites-available/itssafe.in
# Then enable it:  sudo ln -s /etc/nginx/sites-available/itssafe.in /etc/nginx/sites-enabled/
# Then reload:     sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name itssafe.in www.itssafe.in;

    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name itssafe.in www.itssafe.in;

    # ── SSL (managed by Certbot / Let's Encrypt) ──────────────────────
    # Run: sudo certbot --nginx -d itssafe.in -d www.itssafe.in
    ssl_certificate     /etc/letsencrypt/live/itssafe.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itssafe.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy to the Docker container running on port 3001 ────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Security headers ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
}
