# ─────────────────────────────────────────────────────────────────────────────
# STEP 1: Add this to the BOTTOM of:
#   /root/spy-helmet-root/spy-helmet-frontend/nginx.conf
#
# First, add the HTTP-only block to allow certbot to verify domain ownership.
# After cert is obtained, REPLACE the HTTP block with the full config below.
# ─────────────────────────────────────────────────────────────────────────────


# ── PHASE 1: HTTP only (for certbot validation) ───────────────────────────────
# Add this first, reload nginx, run certbot, then replace with PHASE 2 below
server {
    listen 80;
    server_name itssafe.in www.itssafe.in;

    # Allow certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (comment this out during cert generation)
    location / {
        return 301 https://itssafe.in$request_uri;
    }
}


# ── PHASE 2: Full config (add AFTER cert is obtained) ────────────────────────
# Replace the PHASE 1 block above with this one once certbot succeeds
server {
    listen 443 ssl;
    server_name itssafe.in www.itssafe.in;

    # Certs are at /etc/nginx/ssl/ inside container
    # (mounted from /root/spy-helmet-root/certbot/conf on host)
    ssl_certificate     /etc/nginx/ssl/live/itssafe.in/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/itssafe.in/privkey.pem;

    # ── Proxy to itssafe-web via Docker internal DNS ─────────────────────────
    # itssafe-web container is on spy-helmet-root_app-network
    # Docker DNS resolves "itssafe-web" to its container IP automatically
    location / {
        proxy_pass         http://itssafe-web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
