# itssafe.conf — inject into spy-helmet-root-frontend Nginx container
#
# INSTALL:
#   docker cp itssafe-vhost.conf spy-helmet-root-frontend:/etc/nginx/conf.d/itssafe.conf
#   docker exec spy-helmet-root-frontend nginx -t
#   docker exec spy-helmet-root-frontend nginx -s reload

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name itssafe.in www.itssafe.in;
    return 301 https://$host$request_uri;
}

# ── HTTPS — proxy to itssafe-web container via Docker DNS ───────────────────
server {
    listen 443 ssl;
    server_name itssafe.in www.itssafe.in;

    # SSL cert provisioned by certbot (Step 4 in guide)
    ssl_certificate     /etc/letsencrypt/live/itssafe.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itssafe.in/privkey.pem;

    # ── Proxy to itssafe-web (resolved via Docker internal DNS) ──────────────
    # Docker resolves "itssafe-web" to the container's IP automatically
    # because both containers are on the same Docker network (helmet-frontend)
    location / {
        proxy_pass         http://itssafe-web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
