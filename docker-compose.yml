version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Itssafe.in — Standalone Stack
#
# STRATEGY: itssafe-web joins the SAME Docker network as the existing Nginx
# container (helmet-frontend). This lets Nginx proxy to it by container name:
#   proxy_pass http://itssafe-web:80;
#
# No host port binding needed. No firewall rules needed. Clean Docker DNS.
# ──────────────────────────────────────────────────────────────────────────────

services:
  itssafe-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itssafe-web
    restart: unless-stopped
    # No ports: exposed to host — traffic comes from the existing Nginx container
    # via the shared Docker network using container name DNS
    networks:
      - helmet-frontend   # Join existing Nginx container's network
      - itssafe-internal  # Own private network

networks:
  helmet-frontend:
    external: true   # Pre-existing network created by the spy-helmet stack
    # ⚠️  Replace "helmet-frontend" below with the ACTUAL network name
    # found by running: docker inspect spy-helmet-root-frontend --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'
  itssafe-internal:
    driver: bridge
